                - generic [ref=e1105]:
                  - paragraph [ref=e1107]: "Config. Temporal: Chile uses UTC-3 (CLT). Simulación de lanzamiento de app educativa: los agentes son profesionales (docentes, administradores, fundaciones) y mamá influencer. Los docentes y administradores están activos principalmente en horario laboral y después del colegio (17-21), con pico en la tarde-noche. La mamá influencer (madre de niños pequeños) tiene mayor actividad en la mañana (antes de que los hijos vayan al colegio) y en la noche (después de acostarlos), pero su pico es 18-21. Los medios educativos y ONGs también tienen pico en la tarde. La noche profunda (0-5) tiene mínima actividad. Se mantiene una duración de 72h para capturar reacciones iniciales (24-48h) y evolución hasta 72h."
                  - paragraph [ref=e1109]: "Config. de Eventos: Los posts iniciales están diseñados para generar dinámica narrativa inmediata: el lanzamiento oficial (StartupFounder), seguido por tres posturas críticas diferenciadas (escéptico institucional, gremial y pedagógico), y una voz positiva y cercana (ParentInfluencer) que humaniza la tecnología. Esto permite que la ONG funcione como árbitro técnico en los siguientes giros narrativos. Todas las posturas reflejan actitudes realistas en el contexto educativo chileno post-pandemia y priorizan el debate sobre equidad y rol docente."
