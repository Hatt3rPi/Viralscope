# ============================================================
# OBJECTIVES.YAML — Objetivos y prioridades
# ============================================================
# Define qué busca lograr la marca con su contenido.
# Etapa actual: ~300 seguidores IG, marca en crecimiento temprano.
# Prioridad: awareness + engagement > ventas directas.
# ============================================================

# Objetivos activos con su peso en la parrilla
objectives:
  - id: "sales"
    name: "Ventas / Conversión"
    description: "Contenido con CTA directo a compra, landing, o contacto"
    weight: 0.15
    kpis:
      - "clicks al sitio"
      - "mensajes directos"
      - "ventas atribuidas a social"
    cta_examples:
      - "Crea el cuento de tu hijo en lacuenteria.cl"
      - "Link en bio — listo en 10 minutos"
      - "Desde $9.990. Link en bio."

  - id: "followers_ig"
    name: "Seguidores Instagram"
    description: "Contenido diseñado para atraer nuevos seguidores en IG"
    weight: 0.25
    kpis:
      - "seguidores nuevos/semana"
      - "visitas al perfil"
      - "follows desde Explorar"
    cta_examples:
      - "Síguenos para más datos de crianza respaldados por la ciencia"
      - "¿Te sirvió? Síguenos — publicamos uno nuevo cada semana"
      - "Dale follow para no perderte el próximo dato"

  - id: "followers_tiktok"
    name: "Seguidores TikTok"
    description: "Contenido optimizado para crecimiento en TikTok (canal sin contenido aún — peso reasignable)"
    weight: 0.10
    kpis:
      - "seguidores nuevos/semana"
      - "visitas al perfil"
    cta_examples:
      - "Sígueme para más de crianza con ciencia"
      - "Parte 2 mañana — sígueme para no perdértela"

  - id: "followers_linkedin"
    name: "Seguidores LinkedIn"
    description: "Contenido para posicionamiento profesional y crecimiento"
    weight: 0.0                 # No activo por ahora
    kpis:
      - "conexiones nuevas"
      - "impresiones"
    cta_examples: []

  - id: "engagement"
    name: "Engagement"
    description: "Contenido para generar interacción (comentarios, guardados, compartidos)"
    weight: 0.25
    kpis:
      - "engagement rate"
      - "guardados"
      - "compartidos"
      - "comentarios"
    cta_examples:
      - "Guarda esto para cuando lo necesites"
      - "Envíale esto a una mamá que lo necesita"
      - "¿A qué edad empezaste a leerle? Cuéntanos en comentarios"
      - "¿Cuál es el cuento favorito de tu hijo?"

  - id: "awareness"
    name: "Brand Awareness"
    description: "Contenido para que más gente conozca La Cuentería"
    weight: 0.20
    kpis:
      - "alcance"
      - "impresiones"
      - "nuevas cuentas alcanzadas"
    cta_examples:
      - "Comparte esto con alguien que tiene hijos pequeños"
      - "¿Conocías esto? Etiqueta a alguien que necesita saberlo"

  - id: "traffic"
    name: "Tráfico Web"
    description: "Contenido que lleva tráfico al sitio web o blog"
    weight: 0.05
    kpis:
      - "clicks al link en bio"
      - "sesiones desde redes"
    cta_examples:
      - "Link en bio para leer el artículo completo"
      - "Más en lacuenteria.cl/blog"

# Mix de intención por defecto
content_mix:
  viral: 0.20              # Contenido diseñado para máximo alcance (hooks fuertes, datos impactantes)
  quality: 0.65            # Contenido de valor (educativo, emocional, práctico)
  commercial: 0.15         # Contenido con CTA comercial directo

# Validación: objectives weights suman 1.0
# 0.15 + 0.25 + 0.10 + 0.0 + 0.25 + 0.20 + 0.05 = 1.0 ✓
# content_mix suma 1.0
# 0.20 + 0.65 + 0.15 = 1.0 ✓
