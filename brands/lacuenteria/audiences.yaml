# ============================================================
# AUDIENCES.YAML — Buyer personas expandidas (53 variantes)
# ============================================================
# Define quién consume el contenido. Las personas aquí definidas
# se usan como base para la simulación de impacto.
#
# METODOLOGÍA DE PESOS:
# Los pesos reflejan la representación real de cada segmento
# según IG Insights (59,279 cuentas alcanzadas, 4 mar - 2 abr 2026),
# datos de plataforma (73 usuarios registrados), y GA4.
#
# Cálculo base de demografía IG:
#   Mujeres 35-44: 79.8% × 56.6% = 45.2%  (grupo dominante)
#   Mujeres 25-34: 79.8% × 30.8% = 24.6%
#   Mujeres 45-54: 79.8% × 7.7%  = 6.1%
#   Mujeres 55-64: 79.8% × 2.2%  = 1.8%
#   Mujeres 65+:   79.8% × 1.1%  = 0.9%
#   Hombres (derivados = total - mujeres por tramo):
#     25-34: 27.6% - 24.6% = 3.0%
#     35-44: 49.7% - 45.2% = 4.5%
#     45-54: 10.9% - 6.1%  = 4.8%
#     55-64: 7.7% - 1.8%   = 5.9%
#     65+:   3.1% - 0.9%   = 2.2%
#
# EXPANSIÓN A 53 PERSONAS:
# Cada persona original se subdivide en variantes con peso
# máximo de 0.02, diferenciadas por dimensiones reales:
# edad exacta, ubicación, hijos, actitud IA, dispositivo, etc.
#
# | Segmento base  | Peso orig | Variantes | Distribución          |
# |----------------|-----------|-----------|----------------------|
# | Camila         | 0.20      | 10        | 10 × 0.02            |
# | Macarena       | 0.14      | 7         | 7 × 0.02             |
# | Catalina       | 0.10      | 5         | 5 × 0.02             |
# | Javiera        | 0.11      | 6         | 5 × 0.02 + 1 × 0.01  |
# | Constanza      | 0.07      | 4         | 3 × 0.02 + 1 × 0.01  |
# | Patricia       | 0.05      | 3         | 2 × 0.02 + 1 × 0.01  |
# | Francisca      | 0.03      | 2         | 1 × 0.02 + 1 × 0.01  |
# | Valentina      | 0.04      | 2         | 2 × 0.02             |
# | Carolina       | 0.02      | 1         | 1 × 0.02             |
# | Andrea         | 0.04      | 2         | 2 × 0.02             |
# | Tomás          | 0.07      | 4         | 3 × 0.02 + 1 × 0.01  |
# | Rodrigo        | 0.04      | 2         | 2 × 0.02             |
# | Eduardo        | 0.06      | 3         | 3 × 0.02             |
# | Felipe         | 0.03      | 2         | 1 × 0.02 + 1 × 0.01  |
# |----------------|-----------|-----------|----------------------|
# | TOTAL          | 1.00      | 53        | 45 × 0.02 + 8 × 0.01 |
# |                |           |           | = 0.90 + 0.10 = 1.00  |
# ============================================================

