  total_followers:
    instagram: 1006             # IG API 2026-04-02
    tiktok: 0                   # No activo aún con contenido regular
    linkedin: 0                 # No activo
    facebook: 0                 # No activo
    youtube: 0                  # Canal creado pero sin contenido
    x: 0                        # No activo
  website_monthly_sessions: 1265  # GA4: ~42 sesiones/día promedio 30d
  email_subscribers: 72           # Usuarios registrados en plataforma (no newsletter separada)

# Métricas de contenido por plataforma
content_metrics:
