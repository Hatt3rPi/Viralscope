# ============================================================
# PLATFORMS.YAML — Configuración de plataformas
# ============================================================
# Define en qué plataformas publica la marca y las reglas
# específicas de cada una. El usuario selecciona plataformas
# por run, pero estos son los defaults y configuraciones.
# ============================================================

platforms:
  instagram:
    active: true
    handle: "@lacuenteriacl"
    url: "https://www.instagram.com/lacuenteriacl"
    formats:
      - type: "reel"
        active: true
        specs:
          duration: "30-60s"
          aspect_ratio: "9:16"
          max_hashtags: 5
        frequency: "1-2/semana"

      - type: "carousel"
        active: true
        specs:
          slides: 10
          aspect_ratio: "4:5"         # 1080x1350px
          max_text_per_slide: 30      # palabras
          max_hashtags: 8
        frequency: "3-4/semana"

      - type: "story"
        active: true
        specs:
          duration: "15s"
          aspect_ratio: "9:16"
        frequency: "diario"

      - type: "static_post"
        active: true
        specs:
          aspect_ratio: "1:1"
          max_hashtags: 8
        frequency: "1/semana"

    posting_schedule:
      best_days: ["jueves", "viernes", "sábado"]   # Validado con IG Insights (barras de actividad más altas)
      best_hours: ["09:00", "12:00", "20:00"]      # IG Insights: actividad crece desde 6h, meseta 9h-21h, picos 18h-21h
      source: "IG Insights export manual 2026-04-03 (período 4 mar - 2 abr)"

  tiktok:
    active: false
    handle: "@lacuenteria.cl"
    url: "https://www.tiktok.com/@lacuenteria.cl"
    status: "canal creado, sin contenido publicado — prioridad futura después de consolidar IG"
    formats:
      - type: "video"
        active: true
        specs:
          duration: "30-60s"
          aspect_ratio: "9:16"
          max_hashtags: 5
        frequency: "2-3/semana (objetivo)"
    posting_schedule:
      best_days: ["martes", "jueves", "domingo"]    # Estimación basada en nicho crianza/parenting en LATAM
      best_hours: ["12:00", "20:00"]                # Peak mamás: almuerzo + post-acostar-niños
      source: "estimación basada en benchmarks del nicho — ajustar con TikTok Analytics cuando haya contenido"

  linkedin:
    active: false
    handle: ""                  # No creado — potencial futuro para ángulo edtech/emprendimiento
    url: ""
    formats:
      - type: "post"
        active: true
        specs:
          max_length: 3000
          max_hashtags: 5
        frequency: ""

      - type: "article"
        active: true
        specs:
          max_length: 10000
        frequency: ""

      - type: "carousel_pdf"
        active: true
        specs:
          slides: 10
        frequency: ""
    posting_schedule:
      best_days: []
      best_hours: []
      source: ""

  facebook:
    active: false
    handle: ""                  # Meta Ads corren sin página FB activa — solo como plataforma de ads
    url: ""
    formats:
      - type: "post"
        active: true
        specs:
          max_length: 500
          max_hashtags: 3
        frequency: ""

      - type: "reel"
        active: true
        specs:
          duration: "30-60s"
          aspect_ratio: "9:16"
        frequency: ""
    posting_schedule:
      best_days: []
      best_hours: []
      source: ""

  youtube_shorts:
    active: true
    handle: "@lacuenteriacl"
    url: "https://www.youtube.com/@lacuenteriacl"
    status: "canal creado, sin contenido aún — reutilizar reels de IG como shorts"
    formats:
      - type: "short"
        active: true
        specs:
          duration: "30-60s"
          aspect_ratio: "9:16"
        frequency: "1/semana (objetivo)"
    posting_schedule:
      best_days: ["miércoles", "sábado"]            # Estimación para nicho parenting YouTube
      best_hours: ["13:00", "20:00"]
      source: "estimación — ajustar con YouTube Analytics cuando haya contenido"

  x:
    active: false
    handle: ""                  # No prioridad — audiencia target no está en X
    url: ""
    formats:
      - type: "tweet"
        active: true
        specs:
          max_length: 280
          max_hashtags: 2
        frequency: ""

      - type: "thread"
        active: true
        specs:
          max_tweets: 10
          max_length_per_tweet: 280
        frequency: ""
    posting_schedule:
      best_days: []
      best_hours: []
      source: ""
