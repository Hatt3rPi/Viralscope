# ============================================================
# BRAND.YAML — Identidad core de la marca
# ============================================================
# Este archivo define quién es la marca. Es el punto de partida
# para toda generación de contenido.
# ============================================================

name: ""                    # Nombre de la marca
tagline: ""                 # Frase corta que define la marca
url: ""                     # URL del sitio web
description: ""             # Descripción en 2-3 líneas

# Nicho y posicionamiento
niche: ""                   # Nicho principal (ej: "crianza y lectura infantil")
sub_niches:                 # Sub-nichos que cubre
  - ""
positioning: ""             # Cómo se diferencia de la competencia

# Identidad visual
visual:
  colors:
    primary: ""             # Color principal (hex)
    secondary: ""           # Color secundario (hex)
    accent: ""              # Color de acento (hex)
    background: ""          # Color de fondo (hex)
    text: ""                # Color de texto (hex)
  typography:
    headings: ""            # Fuente para títulos
    body: ""                # Fuente para cuerpo
  style: ""                 # Estilo visual general (ej: "minimalista y cálido", "bold y moderno")
  mood: ""                  # Mood board en palabras (ej: "acogedor, confiable, cercano")

# Producto/servicio
offerings:
  - name: ""                # Nombre del producto/servicio
    type: ""                # producto / servicio / digital / físico
    description: ""         # Descripción breve
    url: ""                 # URL específica (si aplica)
    price_range: ""         # Rango de precio (ej: "$5.000 - $15.000 CLP")

# Ubicación y mercado
market:
  country: "CL"            # Código ISO del país principal
  language: "es-CL"        # Idioma + variante regional
  currency: "CLP"          # Moneda
  regions: []              # Regiones específicas (si aplica)

# Restricciones de marca
restrictions:
  never_say: []             # Palabras/frases prohibidas
  never_do: []              # Acciones prohibidas en contenido
  sensitive_topics: []      # Temas que requieren cuidado especial
  legal_notes: ""           # Notas legales relevantes (ej: YMYL, regulaciones)
