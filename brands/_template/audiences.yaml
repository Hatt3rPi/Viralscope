# ============================================================
# AUDIENCES.YAML — Buyer personas y audiencias
# ============================================================
# Define quién consume el contenido. Las personas aquí definidas
# se usan como base para la simulación de impacto.
# ============================================================

# Persona principal (la más importante)
primary:
  name: ""                  # Nombre ficticio (ej: "Camila")
  role: ""                  # Rol/descripción corta (ej: "Mamá primeriza")
  age_range: ""             # ej: "28-35"
  gender: ""                # ej: "mujer" / "hombre" / "mixto"
  location: ""              # ej: "Santiago, Chile"
  occupation: ""            # ej: "profesional joven, trabaja en oficina"
  mbti: ""                  # Tipo MBTI (ej: "ENFJ") — compatible con MiroFish

  # Comportamiento digital
  digital:
    primary_platform: ""    # Plataforma donde más tiempo pasa
    platforms:              # Todas las plataformas que usa
      - platform: ""
        usage: ""           # "heavy" / "moderate" / "light"
        content_preference: "" # qué tipo de contenido consume ahí
    screen_time: ""         # ej: "3-4 hrs/día en redes"
    peak_hours: []          # ej: ["07:00-08:30", "21:00-23:00"]
    content_consumption: "" # ej: "scrollea rápido, guarda lo útil, comparte lo emocional"

  # Psicografía
  psycho:
    pain_points:            # Dolores/problemas que tiene
      - ""
    desires:                # Qué quiere lograr
      - ""
    fears:                  # Qué le preocupa
      - ""
    values:                 # Qué valora
      - ""
    triggers:               # Qué la hace actuar (compartir, comprar, comentar)
      - type: "share"       # share / buy / comment / save / follow
        trigger: ""         # ej: "se identifica emocionalmente"
      - type: "save"
        trigger: ""         # ej: "siente que lo necesitará después"
      - type: "comment"
        trigger: ""         # ej: "quiere contar su experiencia"

  # Relación con la marca
  brand_relationship:
    awareness: ""           # "no conoce" / "ha visto" / "sigue" / "cliente"
    objections: []          # Objeciones para comprar/seguir
    purchase_motivation: "" # Qué la motivaría a comprar

# Personas secundarias
secondary:
  - name: ""
    role: ""
    age_range: ""
    gender: ""
    location: ""
    primary_platform: ""
    usage: ""               # "heavy" / "moderate" / "light"
    mbti: ""                # Tipo MBTI
    key_difference: ""      # Qué la distingue de la persona principal
    triggers:
      - type: ""
        trigger: ""

  - name: ""
    role: ""
    age_range: ""
    gender: ""
    location: ""
    primary_platform: ""
    usage: ""
    key_difference: ""
    triggers:
      - type: ""
        trigger: ""

# Datos reales (pegados de IG Insights / GA4)
# Actualizar mensualmente para calibrar personas
real_data:
  source: ""                # ej: "IG Insights marzo 2026"
  date: ""                  # Fecha de los datos
  demographics:
    age_groups:             # ej: { "25-34": 42%, "35-44": 28% }
    gender_split:           # ej: { "F": 72%, "M": 28% }
    top_cities: []          # ej: ["Santiago", "Viña del Mar", "Concepción"]
    top_countries: []       # ej: ["Chile 85%", "Argentina 5%", "México 4%"]
  behavior:
    avg_engagement_rate: "" # ej: "2.5%"
    best_performing_format: "" # ej: "carruseles educativos"
    peak_days: []           # ej: ["martes", "jueves"]
    peak_hours: []          # ej: ["20:00-22:00"]
